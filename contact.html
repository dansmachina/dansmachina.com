<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Alejandro González</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />

    <!-- Mobile Specific Metas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- Load Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100;0,300;0,400;0,500;0,700;1,100;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
      media="print"
      onload="
        this.onload = null;
        this.removeAttribute('media');
      "
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/glitche-basic.css" />
    <link rel="stylesheet" href="css/glitche-layout.css" />

    <!-- Favicons -->
    <link rel="shortcut icon" href="images/favicons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      href="images/favicons/apple-touch-icon.png"
      loading="lazy"
    />
    <link
      rel="apple-touch-icon"
      sizes="72x72"
      href="images/favicons/apple-touch-icon-72x72.png"
      loading="lazy"
    />
    <link
      rel="apple-touch-icon"
      sizes="114x114"
      href="images/favicons/apple-touch-icon-114x114.png"
      loading="lazy"
    />
  </head>

  <body>
    <!-- Preloader -->
    <div class="preloader">
      <div class="centrize full-width">
        <div class="vertical-center">
          <div class="pre-inner">
            <div class="load typing-load"><p>loading...</p></div>
            <span class="typed-load"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Container -->
    <div class="container">
      <!-- Header -->
      <header>
        <div class="head-top">
          <a href="#" class="menu-btn"><span></span></a>
          <div class="top-menu">
            <ul>
              <li><a href="index.html" class="lnk">Home</a></li>
              <li><a href="about.html" class="lnk">About</a></li>
              <li class="active">
                <a href="contact.html" class="lnk">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </header>

      <!-- Wrapper -->
      <div class="wrapper">
        <!-- Started -->
        <div class="section started">
          <div class="centrize full-width">
            <div class="vertical-center">
              <div class="started-content">
                <div class="h-title glitch-effect" data-text="Contact">
                  Contact
                </div>
                <div class="h-subtitle typing-bread">
                  <p>
                    <a href="index.html">/home</a>/<a href="contact.html"
                      >contact/</a
                    >
                  </p>
                </div>
                <span class="typed-bread"></span>
              </div>
            </div>
          </div>
          <a href="#" class="mouse_btn"
            ><ion-icon name="chevron-down-outline"></ion-icon
          ></a>
        </div>

        <!-- Contact Info -->
        <div class="section contacts">
          <div class="content">
            <div class="title">
              <div class="title_inner">Info</div>
            </div>
            <div class="service-items">
              <div class="service-item">
                <div class="icon">
                  <ion-icon name="paper-plane-outline"></ion-icon>
                </div>
                <div class="name">Email</div>
                <p>
                  <a href="mailto:hi@algope.com">hi ~at~ dansmachina.com</a>
                </p>
              </div>
              <div class="service-item">
                <div class="icon">
                  <ion-icon name="egg-outline"></ion-icon>
                </div>
                <div class="name">Bluesky</div>
                <p>
                  <a
                    href="https://bsky.app/profile/dansmachina.com"
                    target="_blank"
                    >@dansmachina.com</a
                  >
                </p>
              </div>
              <div class="service-item">
                <div class="icon">
                  <ion-icon name="location-outline"></ion-icon>
                </div>
                <div class="name">Location</div>
                <p>København, Danmark</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer>
        <div class="soc">
          <a target="_blank" href="https://linkedin.com/in/algp"
            ><ion-icon name="logo-linkedin"></ion-icon
          ></a>
          <a target="_blank" href="https://bsky.app/profile/dansmachina.com"
            ><ion-icon name="egg-outline"></ion-icon
          ></a>
          <a target="_blank" href="https://github.com/dansmachina"
            ><ion-icon name="logo-github"></ion-icon
          ></a>
        </div>
        <div class="clr"></div>
      </footer>

      <!-- Lines -->
      <div class="line top"></div>
      <div class="line bottom"></div>
      <div class="line left"></div>
      <div class="line right"></div>
    </div>

    <!-- Scripts -->
    <script src="js/glitche-scripts.js" defer></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
