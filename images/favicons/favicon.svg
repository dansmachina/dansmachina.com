<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Alejandro Gonzalez Perez favicon</title>
  <desc id="desc">A simple AGP monogram favicon on a dark rounded square background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141a20" />
      <stop offset="100%" stop-color="#0b0e12" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)" />
  <text
    x="32"
    y="40"
    text-anchor="middle"
    font-family="Roboto Mono, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace"
    font-size="20"
    font-weight="800"
    letter-spacing="-1.8"
    fill="#ffffff"
  >AGP</text>
</svg>